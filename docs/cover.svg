<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="'Trebuchet MS',Verdana,sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2740"/>
      <stop offset="1" stop-color="#12141c"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a8a4f"/>
      <stop offset="1" stop-color="#2c6b3d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="480" fill="url(#sky)"/>

  <!-- bintang -->
  <g fill="#ffffff" opacity=".5">
    <circle cx="120" cy="70" r="2"/><circle cx="300" cy="50" r="1.5"/>
    <circle cx="540" cy="80" r="2"/><circle cx="820" cy="55" r="1.5"/>
    <circle cx="1050" cy="90" r="2"/><circle cx="980" cy="40" r="1.5"/>
    <circle cx="200" cy="120" r="1.5"/><circle cx="700" cy="40" r="1.5"/>
  </g>

  <!-- ladang -->
  <path d="M0 360 Q300 320 600 350 T1200 350 V480 H0 Z" fill="url(#field)"/>
  <g opacity=".9">
    <rect x="0" y="430" width="1200" height="50" fill="#2c6b3d"/>
  </g>

  <!-- bangunan desa kecil -->
  <g transform="translate(150 300)">
    <rect x="0" y="20" width="70" height="60" fill="#fffaf0" stroke="#1d2230" stroke-width="3"/>
    <path d="M-8 20 L35 -10 L78 20 Z" fill="#c0432f" stroke="#1d2230" stroke-width="3"/>
  </g>
  <g transform="translate(980 290)">
    <rect x="0" y="20" width="80" height="70" fill="#fffaf0" stroke="#1d2230" stroke-width="3"/>
    <path d="M-10 20 L40 -12 L90 20 Z" fill="#2d6cb5" stroke="#1d2230" stroke-width="3"/>
  </g>

  <!-- emoji-ish ikon koperasi -->
  <text x="600" y="335" font-size="64" text-anchor="middle">🧑‍🌾  🏦  🌾  🏛️</text>

  <!-- judul -->
  <text x="600" y="170" font-size="68" font-weight="bold" text-anchor="middle" fill="#ffffff">
    Wanderer's <tspan fill="#e0a52b">Koperasi Quest</tspan>
  </text>
  <text x="600" y="215" font-size="26" text-anchor="middle" fill="#cfd6e6">
    RPG Edukasi Keuangan Gen-Z
  </text>

  <!-- badge produk -->
  <g transform="translate(490 240)">
    <rect width="220" height="40" rx="20" fill="#e0a52b"/>
    <text x="110" y="27" font-size="18" font-weight="bold" text-anchor="middle" fill="#1d2230">
      LITERASI KOPERASI
    </text>
  </g>
</svg>
